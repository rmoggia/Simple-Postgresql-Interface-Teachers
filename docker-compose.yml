services:

  # ── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pg_admin_lite_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # esposto sull'host per connessioni dirette
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Flask App ──────────────────────────────────────────
  app:
    build: .
    container_name: pg_admin_lite_app
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-cambia-questa-chiave-in-produzione}
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    volumes:
      - .:/app                # monta la cartella locale dentro il container
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
