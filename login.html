<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Admin Lite — Connessione</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-left">
        <div class="login-brand">
            <span class="brand-icon-large">⬡</span>
            <h1 class="login-title">PG Admin<br><em>Lite</em></h1>
            <p class="login-subtitle">PostgreSQL Manager<br>leggero e diretto.</p>
        </div>
        <div class="login-deco">
            <div class="deco-line"></div>
            <div class="deco-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div class="login-right">
        <div class="login-card">
            <h2 class="card-title">Connetti al database</h2>

            {% if error %}
            <div class="login-error">
                <span>⚠</span> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label for="host">Host</label>
                        <input type="text" id="host" name="host" value="localhost" required autocomplete="off">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label for="port">Porta</label>
                        <input type="text" id="port" name="port" value="5432" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="dbname">Database</label>
                    <input type="text" id="dbname" name="dbname" placeholder="nome_database" required>
                </div>
                <div class="form-group">
                    <label for="user">Utente</label>
                    <input type="text" id="user" name="user" placeholder="postgres" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-connect">
                    Connetti <span>→</span>
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
